[env:m5stack-tough]
platform = espressif32
; PlatformIO has no dedicated "m5stack-tough" board ID.
; Use Core2 as nearest ESP32/M5Stack target for Tough.
board = m5stack-core2
framework = arduino
monitor_speed = 115200

# ESP32 specific settings
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.flash_size = 16MB

# Libraries for M5Stack Tough
lib_deps =
    ; Official unified library with Tough support
    m5stack/M5Unified @ ^0.2.13
    adafruit/Adafruit MAX31865 library
    adafruit/Adafruit BusIO

    ; SD card support (usually included with M5Stack, but explicit here)
    ; SD cards are typically accessed via M5Stack's built-in SD support

# Build flags
build_flags = 
    -Wall
    -Wextra
    -Werror=maybe-uninitialized
    ; Enable verbose serial output
    ; -DCORE_DEBUG_LEVEL=5

# Serial port (adjust for your system)
; monitor_port = /dev/ttyUSB0  ; Linux/Mac USB serial
; monitor_port = COM3           ; Windows
; Leave empty or commented to auto-detect

; Upload speed
# Lower speed improves reliability when the USB-serial link is noisy or the cable is marginal.
upload_speed = 115200

; Source and include paths (PlatformIO handles these automatically with src/ and include/)

# Optional: Custom OTA settings
; upload_protocol = espota

# Development environment preset
lib_ldf_mode = deep+

# Uncomment for verbose output during compilation
# build_verbose = verbose
